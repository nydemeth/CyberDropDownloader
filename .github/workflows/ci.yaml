name: CI

on:
  push:
    branches:
      - main
    paths:
      - "cyberdrop_dl/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "cyberdrop_dl/**/*.py"
      - "cyberdrop_dl/pyproject.toml"
      - "tests/**/*.py"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Run pytest
    permissions:
      contents: read

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.11, 3.14, pypy-3.11]
        exclude:
          # sendtotrash and browser_cookies3 need pywin32, which has some cpython specific implementation details
          # https://github.com/mhammond/pywin32/issues/1289
          - os: windows-latest
            python-version: "pypy-3.11"
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run pytest
        timeout-minutes: 10
        run: |
          uv run pytest -v --cov
