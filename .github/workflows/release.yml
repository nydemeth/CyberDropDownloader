name: "Publish"

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions: {}

jobs:
  publish_to_pypi:
    name: publish_to_pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write # Required for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Ensure tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          pkg_version=$(uv version --short)

          if [[ "$pkg_version" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag '${GITHUB_REF_NAME}' ≠ package version '$pkg_version'"
            exit 1
          fi
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
