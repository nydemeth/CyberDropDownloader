name: Type Check

on: [pull_request]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run basedpyright
        timeout-minutes: 5
        run: |
          uvx basedpyright --level error cyberdrop_dl
